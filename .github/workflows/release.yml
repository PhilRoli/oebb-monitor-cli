name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: macos-latest
    strategy:
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        id: package
        run: |
          ARCHIVE="oebb-monitor-${{ matrix.target }}.tar.gz"
          tar -czf "$ARCHIVE" -C "target/${{ matrix.target }}/release" oebb-monitor
          echo "archive=$ARCHIVE" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ steps.package.outputs.archive }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      arm64_sha256:  ${{ steps.sha.outputs.arm64 }}
      x86_64_sha256: ${{ steps.sha.outputs.x86_64 }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Compute checksums
        id: sha
        run: |
          echo "arm64=$(shasum  -a 256 oebb-monitor-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "x86_64=$(shasum -a 256 oebb-monitor-x86_64-apple-darwin.tar.gz  | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            oebb-monitor-aarch64-apple-darwin.tar.gz
            oebb-monitor-x86_64-apple-darwin.tar.gz

  update-tap:
    needs: release
    runs-on: ubuntu-latest
    continue-on-error: true  # doesn't fail the workflow if the tap repo isn't set up yet

    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/homebrew-oebb-monitor
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update formula
        env:
          VERSION:    ${{ github.ref_name }}
          ARM64_SHA:  ${{ needs.release.outputs.arm64_sha256 }}
          X86_64_SHA: ${{ needs.release.outputs.x86_64_sha256 }}
          REPO:       ${{ github.repository }}
        run: |
          python3 << 'EOF'
          import os, re

          version = os.environ['VERSION'].lstrip('v')
          arm64   = os.environ['ARM64_SHA']
          x86_64  = os.environ['X86_64_SHA']
          repo    = os.environ['REPO']
          base    = f"https://github.com/{repo}/releases/download/v{version}"

          path = 'Formula/oebb-monitor.rb'
          text = open(path).read()

          text = re.sub(r'version "[^"]*"', f'version "{version}"', text)

          text = re.sub(
              r'(on_arm do\n\s+url ")[^"]*"',
              rf'\g<1>{base}/oebb-monitor-aarch64-apple-darwin.tar.gz"',
              text,
          )
          text = re.sub(
              r'(on_arm do\n\s+url "[^"]*"\n\s+sha256 ")[^"]*"',
              rf'\g<1>{arm64}"',
              text,
          )
          text = re.sub(
              r'(on_intel do\n\s+url ")[^"]*"',
              rf'\g<1>{base}/oebb-monitor-x86_64-apple-darwin.tar.gz"',
              text,
          )
          text = re.sub(
              r'(on_intel do\n\s+url "[^"]*"\n\s+sha256 ")[^"]*"',
              rf'\g<1>{x86_64}"',
              text,
          )

          open(path, 'w').write(text)
          print(f"Updated formula to v{version}")
          EOF

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/oebb-monitor.rb
          git diff --staged --quiet || git commit -m "oebb-monitor ${{ github.ref_name }}"
          git push
